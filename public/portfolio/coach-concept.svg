<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 750" width="1200" height="750" role="img" aria-label="Coaching landing page concept">
  <!-- Background -->
  <rect width="1200" height="750" fill="#0d1117"/>

  <!-- Browser chrome -->
  <rect x="0" y="0" width="1200" height="44" fill="#1a1f29"/>
  <circle cx="22" cy="22" r="6" fill="#ff5f57" opacity="0.7"/>
  <circle cx="42" cy="22" r="6" fill="#febc2e" opacity="0.7"/>
  <circle cx="62" cy="22" r="6" fill="#28c840" opacity="0.7"/>
  <rect x="100" y="12" width="320" height="20" rx="10" fill="#252c38"/>
  <text x="120" y="26" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#7a8290">mindshift.coach</text>

  <!-- Header -->
  <text x="60" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="18" font-weight="600" fill="#fafafa">M  Mindshift</text>
  <text x="900" y="100" font-family="-apple-system, system-ui, sans-serif" font-size="12" fill="#9ba3b4">Method · About · Book a call</text>
  <rect x="1080" y="80" width="80" height="32" rx="8" fill="#5eead4"/>
  <text x="1120" y="101" font-family="-apple-system, system-ui, sans-serif" font-size="12" font-weight="600" fill="#0d1117" text-anchor="middle">Start</text>

  <!-- Hero eyebrow -->
  <text x="60" y="190" font-family="-apple-system, system-ui, sans-serif" font-size="11" font-weight="600" fill="#5eead4" letter-spacing="2">EXECUTIVE COACHING · IN PERSON OR ONLINE</text>

  <!-- Hero headline (3 lines) -->
  <text x="60" y="250" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="500" fill="#fafafa" letter-spacing="-1">Clarity for leaders who</text>
  <text x="60" y="305" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="500" fill="#fafafa" letter-spacing="-1">already know <tspan font-style="italic" fill="#5eead4">what</tspan> —</text>
  <text x="60" y="360" font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="500" fill="#fafafa" letter-spacing="-1">just not yet <tspan font-style="italic" fill="#5eead4">how</tspan>.</text>

  <!-- Subtitle -->
  <text x="60" y="410" font-family="-apple-system, system-ui, sans-serif" font-size="16" fill="#9ba3b4">12-week programs. 1-on-1. Results-based pricing.</text>

  <!-- CTAs -->
  <rect x="60" y="445" width="200" height="52" rx="12" fill="#5eead4"/>
  <text x="160" y="478" font-family="-apple-system, system-ui, sans-serif" font-size="14" font-weight="600" fill="#0d1117" text-anchor="middle">Book intro call →</text>
  <rect x="276" y="445" width="180" height="52" rx="12" fill="none" stroke="#3a4252" stroke-width="1"/>
  <text x="366" y="478" font-family="-apple-system, system-ui, sans-serif" font-size="14" fill="#fafafa" text-anchor="middle">Read the method</text>

  <!-- Social proof avatars -->
  <circle cx="80" cy="552" r="14" fill="#252c38"/>
  <circle cx="105" cy="552" r="14" fill="#1f2630"/>
  <circle cx="130" cy="552" r="14" fill="#252c38"/>
  <text x="160" y="557" font-family="-apple-system, system-ui, sans-serif" font-size="13" fill="#9ba3b4">200+ leaders coached</text>

  <!-- Right side: photo card placeholder -->
  <rect x="720" y="170" width="420" height="500" rx="20" fill="url(#warmGrad)"/>
  <defs>
    <linearGradient id="warmGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1f2630"/>
      <stop offset="100%" stop-color="#0d1117"/>
    </linearGradient>
  </defs>
  <!-- Abstract person silhouette -->
  <circle cx="930" cy="360" r="90" fill="#252c38"/>
  <ellipse cx="930" cy="600" rx="170" ry="120" fill="#252c38"/>
  <!-- Caption -->
  <rect x="740" y="610" width="200" height="44" rx="10" fill="#0d1117" opacity="0.85"/>
  <text x="755" y="630" font-family="-apple-system, system-ui, sans-serif" font-size="11" fill="#9ba3b4">CERTIFIED · ICF · PCC</text>
  <text x="755" y="647" font-family="-apple-system, system-ui, sans-serif" font-size="13" font-weight="600" fill="#fafafa">Anna Verbickė</text>
</svg>
